<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculatrice</title>
</head>
<body>
    <div class="Calculatrice">
        <div class="texte">Calculatrice</div>
     <!--disabled c'est pour ne pas effacer ce qui est ecrit-->
        <input class="ecran" type="text" value="44000" disabled>
        <div class="boutons">
            <button class="gray">AC</button>
            <button class="gray">%</button>
             <button class="gray">/</button>
             <button class="orange">x</button>
             <button class="chiffre">7</button>
             <button class="chiffre">8</button>
             <button class="chiffre">9</button>
              <button class="orange">-</button>
              <button class="chiffre">4</button>
              <button class="chiffre">5</button>
              <button class="chiffre">6</button>
              <button class="orange">+</button>
              <button class="chiffre">1</button>
              <button class="chiffre">2</button>
              <button class="chiffre">3</button>
              <button class="orange">=</button>
              <button class="chiffre chiffre0">0</button>
              <button class="chiffre">.</button>






        </div>

    </div>
    
</body>
</html>
